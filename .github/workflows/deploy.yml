name: Publish Docker image

on:
  push:
    branches:
      - main
      - ocaml

env:
  DOCKERHUB_USERNAME: vitortvale
  IMAGE_NAME: rinha-2026-ocaml
  BUILDER_IMAGE_NAME: rinha-2026-ocaml-builder

jobs:
  changes:
    name: Detect builder changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      builder: ${{ steps.detect.outputs.builder }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect builder inputs
        id: detect
        run: |
          set -eu

          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "builder=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" > changed.txt

          if grep -Eq '^(Dockerfile\.builder|\.github/workflows/deploy\.yml|dune-project|rinha_2026_ocaml\.opam)$' changed.txt; then
            echo "builder=true" >> "$GITHUB_OUTPUT"
          else
            echo "builder=false" >> "$GITHUB_OUTPUT"
          fi

  builder:
    name: Build and push builder
    needs: changes
    if: ${{ needs.changes.outputs.builder == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_CLI_ACCESS_TOKEN }}

      - name: Build and push builder image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.builder
          platforms: linux/amd64
          provenance: false
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.BUILDER_IMAGE_NAME }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.BUILDER_IMAGE_NAME }}:${{ github.sha }}

  publish:
    name: Build and push
    needs:
      - changes
      - builder
    if: ${{ always() && (needs.builder.result == 'success' || needs.builder.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_CLI_ACCESS_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          provenance: false
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
